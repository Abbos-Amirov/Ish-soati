version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: ish-soati-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ish-soati
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - ish-soati-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ish-soati-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ish-soati
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PORT: 3000
    depends_on:
      - mongodb
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - ish-soati-network

  nginx:
    image: nginx:alpine
    container_name: ish-soati-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ish-soati-network

volumes:
  mongodb_data:

networks:
  ish-soati-network:
    driver: bridge
